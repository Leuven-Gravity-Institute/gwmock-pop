name: CI
on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
    workflow_dispatch:
    workflow_call:

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ['3.11', '3.12', '3.13']
                os: [ubuntu-latest, windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  python-version: ${{ matrix.python-version }}
                  enable-cache: 'true'

            - name: Install dependencies
              run: uv sync --extra test --frozen

            - name: Run tests with pytest
              run: pytest

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  slug: leuven-gravity-institute/gwsim_pop

    codeql:
        if:
            ${{ github.event_name == 'push' || github.event_name ==
            'pull_request' || github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'workflow_call') }}
        name: codeql
        runs-on: ubuntu-latest
        permissions:
            security-events: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Initialize CodeQL
              uses: github/codeql-action/init@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
              with:
                  languages: python

            - name: Autobuild
              uses: github/codeql-action/autobuild@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4
