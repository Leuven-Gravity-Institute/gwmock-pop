site_name: gwsim_pop Documentation
site_description:
    A Python package for simulating populations of gravitational wave sources.
site_url: https://leuven-gravity-institute.github.io/gwsim_pop/
repo_url: https://github.com/Leuven-Gravity-Institute/gwsim_pop
repo_name: gwsim_pop

theme:
    name: material
    palette:
        - scheme: default
          primary: blue
          accent: blue
          toggle:
              icon: material/brightness-7
              name: Switch to dark mode
        - scheme: slate
          primary: blue
          accent: blue
          toggle:
              icon: material/brightness-4
              name: Switch to light mode
    features:
        - navigation.tabs
        - navigation.sections
        - navigation.expand
        - navigation.top
        - search.highlight
        - content.code.copy
extra_css:
    - style/api.css

plugins:
    - search
    - mkdocstrings:
          default_handler: python
          handlers:
              python:
                  paths: [src]
                  options:
                      show_docstring_attributes: true
                      show_docstring_description: true
                      members_order: source
                      group_by_category: true
                      separate_signature: true
                      docstring_style: google
                      show_source: true
                      show_root_heading: true
                      show_root_full_path: false
                      show_submodules: false
                      show_bases: true
                      show_category_heading: true
                      show_signature: true
                      merge_init_into_class: true
                      show_signature_annotations: true
                      show_symbol_type_heading: true
                      signature_crossrefs: false
                      show_object_full_path: false
                      heading_level: 2
                      filters:
                          - '!^_'
    - gen-files:
          scripts:
              - docs/gen_ref_pages.py
    - mike:
          version_selector: true
          canonical_version: latest

nav:
    - Home: index.md
    - Installation: user_guide/installation.md
    - User Guide:
          - Quick Start: user_guide/quick_start.md
    - API Reference:
          - Overview: reference/index.md
          - Modules:
                - gwsim_pop:
                      - Overview: reference/gwsim_pop/index.md
                      - API:
                            - Overview: reference/gwsim_pop/api/index.md
                            - Parameters: reference/gwsim_pop/api/parameters/index.md
                            - Simulators: reference/gwsim_pop/api/simulators/index.md
                      - Config:
                            - Overview: reference/gwsim_pop/config/index.md
                            - Advanced: reference/gwsim_pop/config/advanced.md
                            - Cosmology: reference/gwsim_pop/config/cosmology.md
                            - Logging: reference/gwsim_pop/config/logging.md
                            - Main: reference/gwsim_pop/config/main.md
                            - Output: reference/gwsim_pop/config/output.md
                            - Population: reference/gwsim_pop/config/population.md
                            - Post-Processing: reference/gwsim_pop/config/post_processing.md
                            - Run: reference/gwsim_pop/config/run.md
                            - Selection: reference/gwsim_pop/config/selection.md
                      - Conversion:
                            - Overview: reference/gwsim_pop/conversion/index.md
                            - Compact Binary Coalescense: reference/gwsim_pop/conversion/cbc.md
                      - Parameters:
                            - Overview: reference/gwsim_pop/parameters/index.md
                            - Binary Black Holes: reference/gwsim_pop/parameters/bbh.md
                      - Random Number Generator:
                            - Overview: reference/gwsim_pop/rng/index.md
                            - RNG Manager: reference/gwsim_pop/rng/rng.md
                      - Version: reference/gwsim_pop/version.md
                      - Utils:
                            - Overview: reference/gwsim_pop/utils/index.md
                            - Logging: reference/gwsim_pop/utils/log.md
    - Developer Guide:
          - Contributing: CONTRIBUTING.md
    - Security: SECURITY.md
    - Troubleshooting: dev/troubleshooting.md

markdown_extensions:
    - pymdownx.highlight:
          anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.tasklist:
          custom_checkbox: true
    - admonition
    - pymdownx.details
    - pymdownx.tabbed:
          alternate_style: true
    - attr_list
    - md_in_html
    - pymdownx.arithmatex:
          generic: true

extra_javascript:
    - javascripts/mathjax.js
    - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
