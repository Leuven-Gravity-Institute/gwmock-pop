name: gwtc4
source_type: bbh
description:
    GWTC-4-inspired BBH graph preset with masses, spins, distance, and extrinsic
    parameters.
parameters:
    detector_frame_mass_1:
        sampler:
            function: planck_tapered_broken_power_law_plus_two_peaks
            arguments:
                alpha_1: 1.72
                alpha_2: 4.51
                transition: 35.6
                minimum: 5.06
                maximum: 300.0
                mean_1: 9.76
                sigma_1: 0.649
                mean_2: 32.8
                sigma_2: 3.92
                taper_range: 4.32
                lambda_0: 0.361
                lambda_1: 0.586
    mass_ratio:
        intermediate: true
        sampler:
            function: planck_tapered_conditional_ratio_power_law
            arguments:
                denominator: '@detector_frame_mass_1'
                beta: 1.26
                numerator_minimum: 5.06
                taper_range: 4.32
                minimum: 0.0
                maximum: 1.0
                n_grids: 2048
    detector_frame_mass_2:
        transform:
            function: multiply
            arguments:
                left: '@detector_frame_mass_1'
                right: '@mass_ratio'
    spin_magnitude_1:
        intermediate: true
        transform:
            function: beta_spin_magnitude
            arguments:
                alpha: 2.0
                beta: 6.0
                reference: '@detector_frame_mass_1'
                minimum: 0.0
                maximum: 0.99
    spin_magnitude_2:
        intermediate: true
        transform:
            function: beta_spin_magnitude
            arguments:
                alpha: 2.0
                beta: 6.0
                reference: '@detector_frame_mass_1'
                minimum: 0.0
                maximum: 0.99
    chi_eff:
        intermediate: true
        transform:
            function: gaussian_chi_eff
            arguments:
                reference: '@detector_frame_mass_1'
                mean: 0.0
                sigma: 0.1
                minimum: -0.5
                maximum: 0.5
    spin_1x:
        transform:
            function: constant_like
            arguments:
                reference: '@detector_frame_mass_1'
                value: 0.0
    spin_1y:
        transform:
            function: constant_like
            arguments:
                reference: '@detector_frame_mass_1'
                value: 0.0
    spin_1z:
        transform:
            function: gaussian_chi_eff
            arguments:
                component: primary
                chi_eff: '@chi_eff'
                mass_1: '@detector_frame_mass_1'
                mass_2: '@detector_frame_mass_2'
                spin_magnitude_1: '@spin_magnitude_1'
                spin_magnitude_2: '@spin_magnitude_2'
    spin_2x:
        transform:
            function: constant_like
            arguments:
                reference: '@detector_frame_mass_1'
                value: 0.0
    spin_2y:
        transform:
            function: constant_like
            arguments:
                reference: '@detector_frame_mass_1'
                value: 0.0
    spin_2z:
        transform:
            function: gaussian_chi_eff
            arguments:
                component: secondary
                chi_eff: '@chi_eff'
                mass_1: '@detector_frame_mass_1'
                mass_2: '@detector_frame_mass_2'
                spin_magnitude_1: '@spin_magnitude_1'
                spin_magnitude_2: '@spin_magnitude_2'
    eccentricity:
        transform:
            function: constant_like
            arguments:
                reference: '@detector_frame_mass_1'
                value: 0.0
    distance:
        sampler:
            function: uniform_comoving_volume_distance
            arguments:
                d_max: 10000.0
    coa_phase:
        transform:
            function: constant_like
            arguments:
                reference: '@distance'
                value: 0.0
    inclination:
        transform:
            function: isotropic_spin_orientation
            arguments:
                reference: '@distance'
    theta_jn:
        transform:
            function: isotropic_spin_orientation
            arguments:
                reference: '@distance'
    long_asc_node:
        transform:
            function: constant_like
            arguments:
                reference: '@distance'
                value: 0.0
    mean_per_ano:
        transform:
            function: constant_like
            arguments:
                reference: '@distance'
                value: 0.0
    coa_time:
        transform:
            function: constant_like
            arguments:
                reference: '@distance'
                value: 0.0
    right_ascension:
        transform:
            function: constant_like
            arguments:
                reference: '@distance'
                value: 0.0
    declination:
        transform:
            function: constant_like
            arguments:
                reference: '@distance'
                value: 0.0
    polarization_angle:
        transform:
            function: constant_like
            arguments:
                reference: '@distance'
                value: 0.0
    redshift:
        transform:
            function: luminosity_distance_to_redshift
            arguments:
                luminosity_distance: '@distance'
    f_ref:
        transform:
            function: constant_like
            arguments:
                reference: '@distance'
                value: 20.0
